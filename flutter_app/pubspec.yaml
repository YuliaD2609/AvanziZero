name: far_from_home
description: AvanziZero - Applicazione Flutter per studenti fuorisede (Gestione Dispensa Zero Spreco e Scansione IA).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  image_picker: ^1.2.2
  geolocator: ^11.0.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  firebase_auth: ^5.7.0
  google_generative_ai: ^0.4.7
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
