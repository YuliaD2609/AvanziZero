name: avanzizero
description: AvanziZero - Applicazione Flutter per studenti fuorisede (Gestione Dispensa Zero Spreco e Scansione IA).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  image_picker: ^1.2.2
  geolocator: ^11.0.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  firebase_auth: ^5.7.0
  google_generative_ai: ^0.4.7
  flutter_dotenv: ^5.1.0
  http: ^1.6.0
  permission_handler: ^12.0.3
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  google_mlkit_text_recognition: ^0.15.1
  tflite_flutter: ^0.12.1
  string_similarity: ^2.2.0
  flutter_timezone: ^5.1.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.2
  firebase_storage: ^12.0.0
  html: ^0.15.4
  xml: ^6.3.0
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - .env
    - assets/ai_models/
    - assets/db/recipes_catalog.db
